<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的课程表 - 2025-2026学年第二学期</title>

    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="课程表">
    <meta name="theme-color" content="#667eea">

    <!-- 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Poppins:wght@400;600;700&family=Righteous&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --accent-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --success-gradient: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            --warning-gradient: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --bg-color: #f8f9fe;
            --card-bg: #ffffff;
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
        }

        body {
            font-family: 'Poppins', 'Noto Sans SC', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 40px;
            overflow-x: hidden;
        }

        /* 背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 20s ease-in-out infinite;
        }

        .bg-decoration::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(240, 147, 251, 0.12) 0%, transparent 70%);
            border-radius: 50%;
            animation: float 25s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-family: 'Righteous', cursive;
            font-size: clamp(1.8rem, 5vw, 3rem);
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .header .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* 控制面板 */
        .control-panel {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .week-toggle {
            display: flex;
            background: #edf2f7;
            border-radius: 12px;
            padding: 4px;
            gap: 4px;
        }

        .week-toggle button {
            padding: 10px 24px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .week-toggle button.active {
            background: var(--card-bg);
            color: #667eea;
            box-shadow: var(--shadow-sm);
        }

        .current-time {
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 500;
            padding: 8px 16px;
            background: #f7fafc;
            border-radius: 10px;
        }

        .edit-btn {
            padding: 10px 20px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .edit-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .edit-btn:active {
            transform: translateY(0);
        }

        /* 课程表主体 */
        .schedule-wrapper {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 24px;
            box-shadow: var(--shadow-lg);
            animation: fadeInUp 0.8s ease-out 0.4s both;
            overflow-x: auto;
        }

        .schedule-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            min-width: 900px;
        }

        .schedule-table th,
        .schedule-table td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #edf2f7;
            position: relative;
        }

        .schedule-table thead th {
            font-family: 'Righteous', cursive;
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text-primary);
            padding: 16px 8px;
            position: sticky;
            top: 0;
            background: var(--card-bg);
            z-index: 10;
        }

        .schedule-table thead th:first-child {
            border-radius: 12px 0 0 0;
        }

        .schedule-table thead th:last-child {
            border-radius: 0 12px 0 0;
        }

        .schedule-table tbody tr:last-child td {
            border-bottom: none;
        }

        .schedule-table tbody tr:last-child td:first-child {
            border-radius: 0 0 0 12px;
        }

        .schedule-table tbody tr:last-child td:last-child {
            border-radius: 0 0 12px 0;
        }

        /* 时间列 */
        .time-slot {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: 0.85rem;
            width: 80px;
            background: #f7fafc;
        }

        /* 当前时间高亮 */
        .time-slot.current {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.15) 0%, rgba(118, 75, 162, 0.15) 100%);
            color: #667eea;
            font-weight: 700;
        }

        /* 课程卡片 */
        .course-card {
            padding: 10px 12px;
            border-radius: 14px;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .course-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 14px 0 0 14px;
        }

        .course-card:hover {
            transform: scale(1.03);
            box-shadow: var(--shadow-md);
        }

        .course-card:active {
            transform: scale(0.98);
        }

        .course-card.current {
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3); }
            50% { box-shadow: 0 0 0 6px rgba(102, 126, 234, 0.1); }
        }

        .course-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
            line-height: 1.3;
        }

        .course-location,
        .course-week-type {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.85);
        }

        /* 空课程格 */
        .empty-slot {
            background: #f7fafc;
            border-radius: 14px;
            min-height: 70px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cbd5e0;
            font-size: 1.5rem;
        }

        .empty-slot:hover {
            background: #edf2f7;
            color: #a0aec0;
        }

        /* 颜色变体 */
        .course-blue {
            background: var(--primary-gradient);
        }

        .course-pink {
            background: var(--secondary-gradient);
        }

        .course-cyan {
            background: var(--accent-gradient);
        }

        .course-green {
            background: var(--success-gradient);
        }

        .course-orange {
            background: var(--warning-gradient);
        }

        .course-purple {
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
        }

        /* 编辑模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .modal.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-family: 'Righteous', cursive;
            font-size: 1.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .close-btn {
            background: #edf2f7;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: #e2e8f0;
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .color-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 3px solid transparent;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: #2d3748;
            transform: scale(1.1);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: #edf2f7;
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn-danger {
            background: var(--warning-gradient);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        /* 云同步设置 */
        .sync-setup-btn {
            padding: 10px 20px;
            background: var(--accent-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }

        .sync-setup-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .sync-status {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sync-status.synced {
            background: rgba(67, 233, 123, 0.15);
            color: #38a169;
        }

        .sync-status.unsynced {
            background: rgba(250, 112, 154, 0.15);
            color: #e53e3e;
        }

        .sync-status.syncing {
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .control-panel {
                flex-direction: column;
                padding: 16px;
            }

            .schedule-wrapper {
                padding: 12px;
            }

            .schedule-table th,
            .schedule-table td {
                padding: 8px 4px;
                font-size: 0.8rem;
            }

            .course-name {
                font-size: 0.85rem;
            }

            .course-location,
            .course-week-type {
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>

    <div class="container">
        <!-- 标题 -->
        <div class="header">
            <h1>📚 我的课程表</h1>
            <p class="subtitle">2025-2026学年 第二学期</p>
        </div>

        <!-- 控制面板 -->
        <div class="control-panel">
            <div class="week-toggle">
                <button class="week-btn active" data-week="odd">单周</button>
                <button class="week-btn" data-week="even">双周</button>
            </div>

            <div class="current-time" id="currentTime">
                第 1 周 · 周一
            </div>

            <button class="edit-btn" onclick="toggleEditMode()">✏️ 编辑课程</button>

            <button class="sync-setup-btn" onclick="showSyncSetupModal()">☁️ 云同步设置</button>

            <div class="sync-status synced" id="syncStatus">
                <span>✓</span>
                <span>已同步</span>
            </div>
        </div>

        <!-- 课程表 -->
        <div class="schedule-wrapper">
            <table class="schedule-table">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>周一</th>
                        <th>周二</th>
                        <th>周三</th>
                        <th>周四</th>
                        <th>周五</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody">
                    <!-- 课程表内容由 JavaScript 生成 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 编辑/添加课程模态框 -->
    <div class="modal" id="courseModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">添加课程</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>

            <form id="courseForm" onsubmit="saveCourse(event)">
                <input type="hidden" id="courseId">

                <div class="form-group">
                    <label>课程名称</label>
                    <input type="text" id="courseName" required placeholder="例：高等数学">
                </div>

                <div class="form-group">
                    <label>教室位置</label>
                    <input type="text" id="courseLocation" placeholder="例：3-101">
                </div>

                <div class="form-group">
                    <label>星期</label>
                    <select id="courseDay" required>
                        <option value="1">周一</option>
                        <option value="2">周二</option>
                        <option value="3">周三</option>
                        <option value="4">周四</option>
                        <option value="5">周五</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>节次</label>
                    <select id="coursePeriod" required>
                        <option value="1">第1-2节</option>
                        <option value="2">第3-5节</option>
                        <option value="3">第6-7节</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>周类型</label>
                    <select id="courseWeekType" required>
                        <option value="all">每周</option>
                        <option value="odd">单周</option>
                        <option value="even">双周</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>卡片颜色</label>
                    <div class="color-options">
                        <div class="color-option selected" data-color="blue" style="background: var(--primary-gradient)"></div>
                        <div class="color-option" data-color="pink" style="background: var(--secondary-gradient)"></div>
                        <div class="color-option" data-color="cyan" style="background: var(--accent-gradient)"></div>
                        <div class="color-option" data-color="green" style="background: var(--success-gradient)"></div>
                        <div class="color-option" data-color="orange" style="background: var(--warning-gradient)"></div>
                        <div class="color-option" data-color="purple" style="background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%)"></div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-danger" id="deleteBtn" onclick="deleteCourse()" style="display: none;">删除课程</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存课程</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 云同步设置模态框 -->
    <div class="modal" id="syncModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>云同步设置</h2>
                <button class="close-btn" onclick="closeSyncModal()">&times;</button>
            </div>

            <div class="form-group">
                <label>JSONBin.io API 密钥</label>
                <input type="text" id="syncApiKey" placeholder="粘贴你的 API 密钥">
                <small style="color: var(--text-secondary); display: block; margin-top: 8px;">
                    获取方式：访问 <a href="https://jsonbin.io" target="_blank">https://jsonbin.io</a> 注册并创建 API 密钥
                </small>
            </div>

            <div class="form-group">
                <label>数据 Bin ID</label>
                <input type="text" id="syncBinId" placeholder="首次使用留空，将自动创建">
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeSyncModal()">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveSyncSettings()">保存设置</button>
            </div>
        </div>
    </div>

    <script>
        // 初始课程数据（从PDF提取）
        const defaultCourses = [
            // 周一
            { id: 1, name: '高等数学', location: '3-101', day: 1, period: 1, weekType: 'odd', color: 'blue' },
            { id: 2, name: '大学英语', location: '7-301', day: 1, period: 2, weekType: 'all', color: 'pink' },
            { id: 3, name: '工程制图', location: '3-303', day: 1, period: 3, weekType: 'all', color: 'cyan' },

            // 周二
            { id: 4, name: '线性代数', location: '3-101', day: 2, period: 1, weekType: 'all', color: 'green' },
            { id: 5, name: '中国近代史纲要', location: '5-413', day: 2, period: 2, weekType: 'all', color: 'orange' },
            { id: 6, name: '体育', location: '田径场', day: 2, period: 3, weekType: 'all', color: 'purple' },

            // 周三
            { id: 7, name: '工程制图', location: '3-501', day: 3, period: 1, weekType: 'all', color: 'cyan' },
            { id: 8, name: '高等数学', location: '3-101', day: 3, period: 2, weekType: 'all', color: 'blue' },
            { id: 9, name: '大学英语', location: '7-403', day: 3, period: 3, weekType: 'all', color: 'pink' },

            // 周四
            { id: 10, name: '工程制图', location: '机房', day: 4, period: 1, weekType: 'all', color: 'cyan' },
            { id: 11, name: '线性代数', location: '3-101', day: 4, period: 2, weekType: 'all', color: 'green' },
            { id: 12, name: '形势与政策', location: '5-513', day: 4, period: 3, weekType: 'even', color: 'orange' },

            // 周五
            { id: 13, name: '高等数学', location: '3-101', day: 5, period: 1, weekType: 'all', color: 'blue' },
            { id: 14, name: '大学英语', location: '7-403', day: 5, period: 2, weekType: 'all', color: 'pink' }
        ];

        // 全局状态
        let courses = [];
        let currentWeekType = 'odd'; // odd 或 even
        let editMode = false;
        let syncApiKey = localStorage.getItem('schedule_sync_api_key') || '';
        let syncBinId = localStorage.getItem('schedule_sync_bin_id') || '';
        let nextId = 15;
        let selectedColor = 'blue';

        // 时间配置
        const periodTimes = {
            1: { start: '08:00', end: '09:40' },
            2: { start: '10:00', end: '12:20' },
            3: { start: '14:00', end: '16:20' }
        };

        // 初始化应用
        function initApp() {
            // 加载课程数据
            loadCourses();

            // 渲染课程表
            renderSchedule();

            // 更新时间显示
            updateTimeDisplay();

            // 设置事件监听
            setupEventListeners();

            // 自动同步
            if (syncApiKey && syncBinId) {
                autoSync();
                setInterval(autoSync, 5 * 60 * 1000); // 每5分钟同步一次
            }

            // 每分钟更新时间显示
            setInterval(updateTimeDisplay, 60000);
        }

        // 加载课程数据
        function loadCourses() {
            const saved = localStorage.getItem('schedule_courses');
            if (saved) {
                courses = JSON.parse(saved);
                nextId = Math.max(...courses.map(c => c.id), 0) + 1;
            } else {
                courses = [...defaultCourses];
                saveCourses();
            }
        }

        // 保存课程数据
        function saveCourses() {
            localStorage.setItem('schedule_courses', JSON.stringify(courses));
            if (syncApiKey && syncBinId) {
                scheduleSync();
            }
        }

        // 渲染课程表
        function renderSchedule() {
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '';

            for (let period = 1; period <= 3; period++) {
                const tr = document.createElement('tr');

                // 时间列
                const timeTd = document.createElement('td');
                timeTd.className = 'time-slot';
                timeTd.textContent = `${periodTimes[period].start}\n${periodTimes[period].end}`;

                // 检查是否是当前时间段
                const now = new Date();
                const currentHour = now.getHours();
                const currentMinute = now.getMinutes();
                const [startHour, startMinute] = periodTimes[period].start.split(':').map(Number);
                const [endHour, endMinute] = periodTimes[period].end.split(':').map(Number);

                const currentMinutes = currentHour * 60 + currentMinute;
                const startMinutes = startHour * 60 + startMinute;
                const endMinutes = endHour * 60 + endMinute;

                if (currentMinutes >= startMinutes && currentMinutes <= endMinutes) {
                    timeTd.classList.add('current');
                }

                tr.appendChild(timeTd);

                // 周一到周五
                for (let day = 1; day <= 5; day++) {
                    const td = document.createElement('td');

                    // 查找该时间段的课程
                    const course = courses.find(c =>
                        c.day === day &&
                        c.period === period &&
                        (c.weekType === 'all' || c.weekType === currentWeekType)
                    );

                    if (course) {
                        const div = document.createElement('div');
                        div.className = `course-card course-${course.color}`;

                        // 检查是否是当前课程
                        const today = now.getDay();
                        if (today === day && timeTd.classList.contains('current')) {
                            div.classList.add('current');
                        }

                        div.innerHTML = `
                            <div class="course-name">${course.name}</div>
                            <div class="course-location">${course.location}</div>
                            ${course.weekType !== 'all' ? `<div class="course-week-type">${course.weekType === 'odd' ? '单周' : '双周'}</div>` : ''}
                        `;

                        if (editMode) {
                            div.onclick = () => openEditModal(course);
                        }

                        td.appendChild(div);
                    } else {
                        const emptyDiv = document.createElement('div');
                        emptyDiv.className = 'empty-slot';
                        emptyDiv.textContent = editMode ? '+' : '';

                        if (editMode) {
                            emptyDiv.onclick = () => openAddModal(day, period);
                        }

                        td.appendChild(emptyDiv);
                    }

                    tr.appendChild(td);
                }

                tbody.appendChild(tr);
            }
        }

        // 更新时间显示
        function updateTimeDisplay() {
            const now = new Date();

            // 计算当前是第几周
            const startDate = new Date('2026-02-23'); // 开学日期
            const diffTime = now.getTime() - startDate.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const currentWeek = Math.floor(diffDays / 7) + 1;

            // 判断单双周
            currentWeekType = currentWeek % 2 === 0 ? 'even' : 'odd';

            // 获取星期几
            const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const dayName = days[now.getDay()];

            // 更新显示
            document.getElementById('currentTime').textContent = `第 ${currentWeek} 周 · ${dayName}`;

            // 更新单双周按钮状态
            document.querySelectorAll('.week-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.week === currentWeekType);
            });

            // 重新渲染课程表
            renderSchedule();
        }

        // 设置事件监听
        function setupEventListeners() {
            // 单双周切换
            document.querySelectorAll('.week-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentWeekType = btn.dataset.week;
                    renderSchedule();
                });
            });

            // 颜色选择
            document.querySelectorAll('.color-option').forEach(option => {
                option.addEventListener('click', () => {
                    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                    option.classList.add('selected');
                    selectedColor = option.dataset.color;
                });
            });
        }

        // 切换编辑模式
        function toggleEditMode() {
            editMode = !editMode;
            const btn = document.querySelector('.edit-btn');
            btn.textContent = editMode ? '✓ 完成编辑' : '✏️ 编辑课程';
            btn.style.background = editMode ? 'var(--success-gradient)' : 'var(--primary-gradient)';
            renderSchedule();
        }

        // 打开添加模态框
        function openAddModal(day, period) {
            document.getElementById('modalTitle').textContent = '添加课程';
            document.getElementById('courseForm').reset();
            document.getElementById('courseId').value = '';
            document.getElementById('courseDay').value = day;
            document.getElementById('coursePeriod').value = period;
            document.getElementById('deleteBtn').style.display = 'none';

            // 重置颜色选择
            document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            document.querySelector('.color-option[data-color="blue"]').classList.add('selected');
            selectedColor = 'blue';

            document.getElementById('courseModal').classList.add('active');
        }

        // 打开编辑模态框
        function openEditModal(course) {
            document.getElementById('modalTitle').textContent = '编辑课程';
            document.getElementById('courseId').value = course.id;
            document.getElementById('courseName').value = course.name;
            document.getElementById('courseLocation').value = course.location;
            document.getElementById('courseDay').value = course.day;
            document.getElementById('coursePeriod').value = course.period;
            document.getElementById('courseWeekType').value = course.weekType;
            document.getElementById('deleteBtn').style.display = 'block';

            // 设置颜色
            document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            document.querySelector(`.color-option[data-color="${course.color}"]`).classList.add('selected');
            selectedColor = course.color;

            document.getElementById('courseModal').classList.add('active');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('courseModal').classList.remove('active');
        }

        // 保存课程
        function saveCourse(e) {
            e.preventDefault();

            const courseId = document.getElementById('courseId').value;
            const courseData = {
                name: document.getElementById('courseName').value,
                location: document.getElementById('courseLocation').value,
                day: parseInt(document.getElementById('courseDay').value),
                period: parseInt(document.getElementById('coursePeriod').value),
                weekType: document.getElementById('courseWeekType').value,
                color: selectedColor
            };

            if (courseId) {
                // 编辑现有课程
                const index = courses.findIndex(c => c.id === parseInt(courseId));
                if (index !== -1) {
                    courses[index] = { ...courses[index], ...courseData };
                }
            } else {
                // 添加新课程
                courses.push({ id: nextId++, ...courseData });
            }

            saveCourses();
            renderSchedule();
            closeModal();
        }

        // 删除课程
        function deleteCourse() {
            const courseId = parseInt(document.getElementById('courseId').value);
            courses = courses.filter(c => c.id !== courseId);
            saveCourses();
            renderSchedule();
            closeModal();
        }

        // 显示云同步设置模态框
        function showSyncSetupModal() {
            document.getElementById('syncApiKey').value = syncApiKey;
            document.getElementById('syncBinId').value = syncBinId;
            document.getElementById('syncModal').classList.add('active');
        }

        // 关闭云同步设置模态框
        function closeSyncModal() {
            document.getElementById('syncModal').classList.remove('active');
        }

        // 保存云同步设置
        function saveSyncSettings() {
            syncApiKey = document.getElementById('syncApiKey').value.trim();
            const binIdInput = document.getElementById('syncBinId').value.trim();

            localStorage.setItem('schedule_sync_api_key', syncApiKey);

            if (syncApiKey) {
                if (binIdInput) {
                    syncBinId = binIdInput;
                    localStorage.setItem('schedule_sync_bin_id', syncBinId);
                    // 立即同步
                    syncToCloud();
                } else {
                    // 创建新的 Bin
                    createNewBin();
                }
            }

            closeSyncModal();
        }

        // 创建新的数据 Bin
        async function createNewBin() {
            if (!syncApiKey) return;

            updateSyncStatus('syncing');

            try {
                const data = {
                    courses: courses,
                    lastUpdate: new Date().toISOString()
                };

                const response = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': syncApiKey,
                        'X-Bin-Name': 'class-schedule'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    syncBinId = result.metadata.id;
                    localStorage.setItem('schedule_sync_bin_id', syncBinId);
                    updateSyncStatus('synced');
                } else {
                    throw new Error('创建失败');
                }
            } catch (error) {
                console.error('创建数据 Bin 失败:', error);
                updateSyncStatus('unsynced');
                alert('云同步设置失败，请检查 API 密钥是否正确');
            }
        }

        // 同步到云端
        async function syncToCloud() {
            if (!syncApiKey || !syncBinId) return;

            updateSyncStatus('syncing');

            try {
                const data = {
                    courses: courses,
                    lastUpdate: new Date().toISOString()
                };

                const response = await fetch(`https://api.jsonbin.io/v3/b/${syncBinId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': syncApiKey
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    updateSyncStatus('synced');
                } else {
                    throw new Error('同步失败');
                }
            } catch (error) {
                console.error('同步失败:', error);
                updateSyncStatus('unsynced');
            }
        }

        // 从云端同步
        async function syncFromCloud() {
            if (!syncApiKey || !syncBinId) return;

            updateSyncStatus('syncing');

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${syncBinId}/latest`, {
                    headers: {
                        'X-Master-Key': syncApiKey
                    }
                });

                if (response.ok) {
                    const result = await response.json();
                    const data = result.record;

                    if (data.courses && Array.isArray(data.courses)) {
                        courses = data.courses;
                        saveCourses();
                        renderSchedule();
                        updateSyncStatus('synced');
                    }
                } else {
                    throw new Error('获取数据失败');
                }
            } catch (error) {
                console.error('从云端同步失败:', error);
                updateSyncStatus('unsynced');
            }
        }

        // 自动同步
        function autoSync() {
            // 先从云端获取最新数据，然后再上传本地数据
            syncFromCloud().then(() => {
                if (syncApiKey && syncBinId) {
                    scheduleSync();
                }
            });
        }

        // 延迟同步（避免频繁请求）
        let syncTimeout;
        function scheduleSync() {
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => {
                syncToCloud();
            }, 1000);
        }

        // 更新同步状态显示
        function updateSyncStatus(status) {
            const syncStatus = document.getElementById('syncStatus');
            syncStatus.className = `sync-status ${status}`;

            if (status === 'synced') {
                syncStatus.innerHTML = '<span>✓</span><span>已同步</span>';
            } else if (status === 'syncing') {
                syncStatus.innerHTML = '<span>⟳</span><span>同步中...</span>';
            } else {
                syncStatus.innerHTML = '<span>✗</span><span>未同步</span>';
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
