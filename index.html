<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>课程表 - 2025-2026学年第二学期</title>

    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="课程表">
    <meta name="theme-color" content="#FFFFFF">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #FAFAFA;
            --bg-card: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #757575;
            --text-tertiary: #BDBDBD;
            --border-light: #F0F0F0;
            --border-medium: #E0E0E0;

            --color-blue: #4A90E2;
            --color-purple: #9B59B6;
            --color-pink: #E91E63;
            --color-red: #F44336;
            --color-orange: #FF9800;
            --color-teal: #009688;
            --color-green: #4CAF50;
            --color-cyan: #00BCD4;
            --color-indigo: #3F51B5;

            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.08);

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
        }

        body {
            font-family: 'Outfit', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        /* 顶部标题栏 */
        .header {
            text-align: center;
            margin-bottom: 24px;
            animation: fadeInDown 0.5s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .header .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* 控制栏 */
        .controls {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            box-shadow: var(--shadow-sm);
            animation: fadeInUp 0.5s ease-out 0.1s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .week-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .week-toggle {
            display: flex;
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            padding: 3px;
            gap: 3px;
        }

        .week-toggle button {
            padding: 8px 16px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 500;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .week-toggle button.active {
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: var(--shadow-sm);
        }

        .current-time {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            padding: 8px 12px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: var(--text-primary);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
        }

        .btn-ghost:hover {
            background: var(--bg-primary);
        }

        /* 课程表容器 */
        .schedule-container {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 16px;
            box-shadow: var(--shadow-md);
            animation: fadeInUp 0.5s ease-out 0.2s both;
            overflow: hidden;
        }

        .schedule-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .schedule-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed;
        }

        .schedule-table thead th {
            font-size: clamp(10px, 2vw, 13px);
            font-weight: 600;
            color: var(--text-secondary);
            padding: clamp(4px, 1vw, 12px) clamp(2px, 0.5vw, 8px);
            text-align: center;
            border-bottom: 1px solid var(--border-light);
            white-space: nowrap;
        }

        .schedule-table thead th.today {
            color: var(--color-blue);
        }

        .schedule-table tbody td {
            padding: clamp(3px, 0.8vw, 6px);
            border-bottom: 1px solid var(--border-light);
            border-right: 1px solid var(--border-light);
            vertical-align: top;
        }

        .schedule-table tbody td:last-child {
            border-right: none;
        }

        .schedule-table tbody tr:last-child td {
            border-bottom: none;
        }

        /* 时间列 */
        .time-cell {
            width: clamp(45px, 8vw, 60px);
            padding: clamp(4px, 0.8vw, 8px) clamp(2px, 0.4vw, 4px);
            text-align: center;
            background: var(--bg-primary);
            font-size: clamp(9px, 1.5vw, 11px);
            font-weight: 500;
            color: var(--text-secondary);
            vertical-align: middle;
            white-space: nowrap;
        }

        .time-cell.now {
            background: linear-gradient(135deg, var(--color-blue), #5BA3F5);
            color: white;
            border-radius: var(--radius-sm);
        }

        /* 当前时间指示线 */
        .today-column {
            background: rgba(74, 144, 226, 0.02);
        }

        /* 课程卡片 */
        .course-card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: clamp(6px, 1.2vw, 10px) clamp(8px, 1.5vw, 12px);
            margin-bottom: clamp(3px, 0.6vw, 6px);
            border-left: clamp(2px, 0.4vw, 3px) solid;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .course-card:hover {
            transform: translateX(2px);
            box-shadow: var(--shadow-md);
        }

        .course-card:active {
            transform: scale(0.98);
        }

        .course-card.current {
            background: linear-gradient(135deg, rgba(74, 144, 226, 0.08), rgba(91, 163, 245, 0.08));
            box-shadow: 0 0 0 2px var(--color-blue);
        }

        .course-card.current::before {
            content: '正在上课';
            position: absolute;
            top: clamp(3px, 0.6vw, 6px);
            right: clamp(3px, 0.6vw, 6px);
            font-size: clamp(7px, 1.2vw, 9px);
            font-weight: 600;
            color: var(--color-blue);
            padding: 2px 6px;
            background: rgba(74, 144, 226, 0.1);
            border-radius: 4px;
        }

        .course-name {
            font-size: clamp(11px, 2vw, 13px);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: clamp(2px, 0.4vw, 4px);
            line-height: 1.3;
            word-wrap: break-word;
            hyphens: auto;
        }

        .course-location {
            font-size: clamp(9px, 1.5vw, 11px);
            color: var(--text-secondary);
            margin-bottom: clamp(2px, 0.4vw, 4px);
            display: flex;
            align-items: center;
            gap: clamp(2px, 0.4vw, 4px);
        }

        .course-location::before {
            content: '📍';
            font-size: clamp(8px, 1.2vw, 10px);
        }

        .course-weeks {
            font-size: clamp(8px, 1.2vw, 10px);
            color: var(--text-tertiary);
            line-height: 1.2;
        }

        /* 课程颜色 */
        .course-card.color-blue { border-left-color: var(--color-blue); }
        .course-card.color-purple { border-left-color: var(--color-purple); }
        .course-card.color-pink { border-left-color: var(--color-pink); }
        .course-card.color-red { border-left-color: var(--color-red); }
        .course-card.color-orange { border-left-color: var(--color-orange); }
        .course-card.color-teal { border-left-color: var(--color-teal); }
        .course-card.color-green { border-left-color: var(--color-green); }
        .course-card.color-cyan { border-left-color: var(--color-cyan); }
        .course-card.color-indigo { border-left-color: var(--color-indigo); }

        /* 空白格子 */
        .empty-cell {
            min-height: 60px;
            border-radius: var(--radius-md);
            background: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-tertiary);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .empty-cell:hover {
            background: var(--border-light);
            color: var(--text-secondary);
        }

        /* 编辑模式 */
        .editing .course-card {
            cursor: move;
        }

        .editing .course-card::after {
            content: '✏️';
            position: absolute;
            top: 6px;
            right: 6px;
            font-size: 11px;
        }

        /* 模态框 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease-out;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            padding: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow-lg);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-primary);
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: var(--border-light);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-md);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--color-blue);
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
        }

        .color-picker {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: var(--text-primary);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 24px;
        }

        .modal-actions .btn {
            flex: 1;
            justify-content: center;
            padding: 12px;
        }

        .btn-secondary {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        .btn-danger {
            background: var(--color-red);
            color: white;
        }

        /* 云同步状态 */
        .sync-status {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 6px 12px;
            background: var(--bg-primary);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .sync-status.synced {
            color: var(--color-green);
        }

        .sync-status.unsynced {
            color: var(--color-red);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: clamp(8px, 2vw, 12px);
            }

            .header h1 {
                font-size: clamp(20px, 5vw, 24px);
            }

            .controls {
                flex-wrap: wrap;
                padding: clamp(8px, 1.5vw, 10px) clamp(10px, 2vw, 12px);
                gap: clamp(8px, 1.5vw, 12px);
            }

            .week-info {
                width: 100%;
                justify-content: space-between;
            }

            .actions {
                width: 100%;
            }

            .btn {
                flex: 1;
                justify-content: center;
                font-size: clamp(11px, 2.5vw, 13px);
                padding: clamp(6px, 1.2vw, 8px) clamp(10px, 2vw, 16px);
            }

            .week-toggle button {
                padding: clamp(6px, 1.2vw, 8px) clamp(12px, 2.5vw, 16px);
                font-size: clamp(11px, 2.5vw, 13px);
            }

            .current-time {
                font-size: clamp(11px, 2.5vw, 13px);
                padding: clamp(6px, 1.2vw, 8px) clamp(10px, 2vw, 12px);
            }

            .schedule-container {
                padding: clamp(8px, 1.5vw, 12px);
            }
        }

        /* 超小屏幕优化 */
        @media (max-width: 380px) {
            .header .subtitle {
                font-size: clamp(11px, 2.5vw, 13px);
            }

            .schedule-container {
                padding: clamp(6px, 1.2vw, 8px);
            }

            .course-name {
                font-size: clamp(10px, 2.2vw, 11px);
            }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 14px;
            margin-bottom: 8px;
        }

        .empty-state-sub {
            font-size: 12px;
            color: var(--text-tertiary);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <div class="header">
            <h1>课程表</h1>
            <p class="subtitle">2025-2026学年 第二学期 · 杨秋实</p>
        </div>

        <!-- 控制栏 -->
        <div class="controls">
            <div class="week-info">
                <div class="week-toggle">
                    <button class="week-btn active" data-week="odd">单周</button>
                    <button class="week-btn" data-week="even">双周</button>
                </div>
                <div class="current-time" id="currentTime">
                    加载中...
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-ghost" onclick="showSyncSetup()">☁️</button>
                <button class="btn btn-primary" onclick="toggleEditMode()">✏️ 编辑</button>
            </div>
        </div>

        <!-- 课程表 -->
        <div class="schedule-container">
            <div class="schedule-wrapper">
                <table class="schedule-table">
                    <thead>
                        <tr>
                            <th></th>
                            <th data-day="1">周一</th>
                            <th data-day="2">周二</th>
                            <th data-day="3">周三</th>
                            <th data-day="4">周四</th>
                            <th data-day="5">周五</th>
                            <th data-day="6">周六</th>
                            <th data-day="7">周日</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody">
                        <!-- 由 JavaScript 生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 课程编辑模态框 -->
    <div class="modal-overlay" id="courseModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">添加课程</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>

            <form id="courseForm" onsubmit="saveCourse(event)">
                <input type="hidden" id="courseId">

                <div class="form-group">
                    <label>课程名称</label>
                    <input type="text" id="courseName" required placeholder="例如：高等数学">
                </div>

                <div class="form-group">
                    <label>上课地点</label>
                    <input type="text" id="courseLocation" placeholder="例如：3-101">
                </div>

                <div class="form-group">
                    <label>星期</label>
                    <select id="courseDay" required>
                        <option value="1">周一</option>
                        <option value="2">周二</option>
                        <option value="3">周三</option>
                        <option value="4">周四</option>
                        <option value="5">周五</option>
                        <option value="6">周六</option>
                        <option value="7">周日</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>节次</label>
                    <select id="coursePeriod" required>
                        <option value="1">第1-2节</option>
                        <option value="2">第3-4节</option>
                        <option value="3">第5-6节</option>
                        <option value="4">第7-8节</option>
                        <option value="5">第9-10节</option>
                        <option value="6">第11-12节</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>周数范围</label>
                    <input type="text" id="courseWeeks" placeholder="例如：1-18周 或 12-15周">
                </div>

                <div class="form-group">
                    <label>周类型</label>
                    <select id="courseWeekType">
                        <option value="all">每周</option>
                        <option value="odd">仅单周</option>
                        <option value="even">仅双周</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>卡片颜色</label>
                    <div class="color-picker">
                        <div class="color-option selected" data-color="blue" style="background: var(--color-blue)"></div>
                        <div class="color-option" data-color="purple" style="background: var(--color-purple)"></div>
                        <div class="color-option" data-color="pink" style="background: var(--color-pink)"></div>
                        <div class="color-option" data-color="red" style="background: var(--color-red)"></div>
                        <div class="color-option" data-color="orange" style="background: var(--color-orange)"></div>
                        <div class="color-option" data-color="teal" style="background: var(--color-teal)"></div>
                        <div class="color-option" data-color="green" style="background: var(--color-green)"></div>
                        <div class="color-option" data-color="cyan" style="background: var(--color-cyan)"></div>
                        <div class="color-option" data-color="indigo" style="background: var(--color-indigo)"></div>
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn btn-danger" id="deleteBtn" onclick="deleteCourse()" style="display: none;">删除</button>
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 云同步设置模态框 -->
    <div class="modal-overlay" id="syncModal">
        <div class="modal">
            <div class="modal-header">
                <h2>云同步设置</h2>
                <button class="modal-close" onclick="closeSyncModal()">&times;</button>
            </div>

            <div class="form-group">
                <label>JSONBin.io API 密钥</label>
                <input type="text" id="syncApiKey" placeholder="粘贴你的 API 密钥">
                <small style="color: var(--text-secondary); display: block; margin-top: 6px; font-size: 11px;">
                    访问 <a href="https://jsonbin.io" target="_blank" style="color: var(--color-blue);">jsonbin.io</a> 注册并获取密钥
                </small>
            </div>

            <div class="form-group">
                <label>数据 Bin ID</label>
                <input type="text" id="syncBinId" placeholder="首次使用留空，将自动创建">
            </div>

            <div class="modal-actions">
                <button type="button" class="btn btn-secondary" onclick="closeSyncModal()">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveSyncSettings()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // 课程数据（杨秋实的课表）
        const defaultCourses = [
            { id: 1, name: '基层治理现代化问题研究', location: '东6-C502', day: 1, period: 2, weeks: '1-18周', weekType: 'all', color: 'blue' },
            { id: 2, name: '当代中国政治制度', location: '东6-C502', day: 2, period: 2, weeks: '1-18周', weekType: 'all', color: 'purple' },
            { id: 3, name: '形势与政策（四）', location: '东6-C301', day: 2, period: 4, weeks: '12-15周', weekType: 'all', color: 'red' },
            { id: 4, name: '大学英语（四）', location: '东6-C502', day: 3, period: 1, weeks: '1-16周', weekType: 'all', color: 'teal' },
            { id: 5, name: '公共体育（羽毛球2）', location: '东校羽毛球馆', day: 3, period: 2, weeks: '1-18周', weekType: 'all', color: 'green' },
            { id: 6, name: '西方政治思想史', location: '东6-C502', day: 3, period: 3, weeks: '1-18周', weekType: 'all', color: 'orange' },
            { id: 7, name: '公共组织学', location: '东6-C106', day: 3, period: 4, weeks: '1-18周', weekType: 'all', color: 'pink' },
            { id: 8, name: '基层治理现代化问题研究', location: '东6-C301', day: 4, period: 1, weeks: '2-18周', weekType: 'even', color: 'blue' },
            { id: 9, name: '当代中国政治制度', location: '东6-C502', day: 4, period: 2, weeks: '1-17周', weekType: 'odd', color: 'purple' },
            { id: 10, name: '公共组织学', location: '东6-C502', day: 5, period: 1, weeks: '1-18周', weekType: 'all', color: 'pink' },
            { id: 11, name: '习近平新时代中国特色社会主义思想概论', location: '东6-C301', day: 5, period: 2, weeks: '1-16周', weekType: 'all', color: 'red' },
            { id: 12, name: '西方政治思想史', location: '东6-C502', day: 5, period: 3, weeks: '2-18周', weekType: 'even', color: 'orange' },
            { id: 13, name: '创业基础', location: '东6-C301', day: 5, period: 4, weeks: '1-17周', weekType: 'odd', color: 'cyan' }
        ];

        // 节次时间
        const periodTimes = {
            1: { start: '08:00', end: '09:40' },
            2: { start: '10:00', end: '11:40' },
            3: { start: '14:00', end: '15:40' },
            4: { start: '16:00', end: '17:40' },
            5: { start: '19:00', end: '20:40' },
            6: { start: '21:00', end: '22:40' }
        };

        // 全局状态
        let courses = [];
        let currentWeekType = 'odd';
        let editMode = false;
        let selectedColor = 'blue';
        let syncApiKey = localStorage.getItem('schedule_sync_api_key') || '';
        let syncBinId = localStorage.getItem('schedule_sync_bin_id') || '';
        let nextId = 100;

        // 初始化
        function init() {
            loadCourses();
            updateTime();
            renderSchedule();
            setupEventListeners();

            // 自动同步
            if (syncApiKey && syncBinId) {
                autoSync();
                setInterval(autoSync, 5 * 60 * 1000);
            }

            setInterval(updateTime, 60000);
        }

        // 加载课程
        function loadCourses() {
            const saved = localStorage.getItem('class_schedule_courses');
            if (saved) {
                courses = JSON.parse(saved);
                nextId = Math.max(...courses.map(c => c.id), 0) + 1;
            } else {
                courses = [...defaultCourses];
                saveCourses();
            }
        }

        // 保存课程
        function saveCourses() {
            localStorage.setItem('class_schedule_courses', JSON.stringify(courses));
            if (syncApiKey && syncBinId) {
                scheduleSync();
            }
        }

        // 更新时间显示
        function updateTime() {
            const now = new Date();
            const startDate = new Date('2026-03-09'); // 开学日期（3月9日开始上课）
            const diffTime = now.getTime() - startDate.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const currentWeek = Math.floor(diffDays / 7) + 1;
            currentWeekType = currentWeek % 2 === 0 ? 'even' : 'odd';

            const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            const dayName = days[now.getDay()];

            document.getElementById('currentTime').textContent = `第 ${currentWeek} 周 · ${dayName}`;

            // 更新周次按钮
            document.querySelectorAll('.week-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.week === currentWeekType);
            });

            // 高亮今天
            const today = now.getDay();
            document.querySelectorAll('[data-day]').forEach(th => {
                th.classList.toggle('today', parseInt(th.dataset.day) === today);
            });

            renderSchedule();
        }

        // 渲染课程表
        function renderSchedule() {
            const tbody = document.getElementById('scheduleBody');
            tbody.innerHTML = '';

            const now = new Date();
            const today = now.getDay();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();

            for (let period = 1; period <= 6; period++) {
                const tr = document.createElement('tr');

                // 时间列
                const timeTd = document.createElement('td');
                timeTd.className = 'time-cell';
                timeTd.innerHTML = `${periodTimes[period].start}<br>${periodTimes[period].end}`;

                // 判断是否是当前时间
                const [startHour, startMinute] = periodTimes[period].start.split(':').map(Number);
                const [endHour, endMinute] = periodTimes[period].end.split(':').map(Number);
                const currentMinutes = currentHour * 60 + currentMinute;
                const startMinutes = startHour * 60 + startMinute;
                const endMinutes = endHour * 60 + endMinute;

                if (currentMinutes >= startMinutes && currentMinutes <= endMinutes) {
                    timeTd.classList.add('now');
                }

                tr.appendChild(timeTd);

                // 周一到周日
                for (let day = 1; day <= 7; day++) {
                    const td = document.createElement('td');
                    if (day === today) {
                        td.classList.add('today-column');
                    }

                    // 查找课程
                    const course = courses.find(c =>
                        c.day === day &&
                        c.period === period &&
                        (c.weekType === 'all' || c.weekType === currentWeekType)
                    );

                    if (course) {
                        const div = document.createElement('div');
                        div.className = `course-card color-${course.color}`;

                        // 判断是否是当前课程
                        if (day === today && timeTd.classList.contains('now')) {
                            div.classList.add('current');
                        }

                        div.innerHTML = `
                            <div class="course-name">${course.name}</div>
                            <div class="course-location">${course.location}</div>
                            <div class="course-weeks">${course.weeks}${course.weekType !== 'all' ? (course.weekType === 'odd' ? ' · 单周' : ' · 双周') : ''}</div>
                        `;

                        if (editMode) {
                            div.onclick = () => openEditModal(course);
                        }

                        td.appendChild(div);
                    } else {
                        const emptyDiv = document.createElement('div');
                        emptyDiv.className = 'empty-cell';
                        if (editMode) {
                            emptyDiv.textContent = '+';
                            emptyDiv.onclick = () => openAddModal(day, period);
                        }
                        td.appendChild(emptyDiv);
                    }

                    tr.appendChild(td);
                }

                tbody.appendChild(tr);
            }
        }

        // 设置事件监听
        function setupEventListeners() {
            // 周次切换
            document.querySelectorAll('.week-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    currentWeekType = btn.dataset.week;
                    document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    renderSchedule();
                });
            });

            // 颜色选择
            document.querySelectorAll('.color-option').forEach(option => {
                option.addEventListener('click', () => {
                    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
                    option.classList.add('selected');
                    selectedColor = option.dataset.color;
                });
            });

            // 编辑模式
            document.body.addEventListener('click', (e) => {
                if (editMode && !e.target.closest('.modal-overlay') && !e.target.closest('.course-card') && !e.target.closest('.empty-cell') && !e.target.closest('.btn')) {
                    // 点击空白区域不退出编辑模式
                }
            });
        }

        // 切换编辑模式
        function toggleEditMode() {
            editMode = !editMode;
            document.body.classList.toggle('editing', editMode);
            const btn = document.querySelector('.btn-primary');
            btn.textContent = editMode ? '✓ 完成' : '✏️ 编辑';
            renderSchedule();
        }

        // 打开添加模态框
        function openAddModal(day, period) {
            document.getElementById('modalTitle').textContent = '添加课程';
            document.getElementById('courseForm').reset();
            document.getElementById('courseId').value = '';
            document.getElementById('courseDay').value = day;
            document.getElementById('coursePeriod').value = period;
            document.getElementById('deleteBtn').style.display = 'none';

            document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            document.querySelector('.color-option[data-color="blue"]').classList.add('selected');
            selectedColor = 'blue';

            document.getElementById('courseModal').classList.add('active');
        }

        // 打开编辑模态框
        function openEditModal(course) {
            document.getElementById('modalTitle').textContent = '编辑课程';
            document.getElementById('courseId').value = course.id;
            document.getElementById('courseName').value = course.name;
            document.getElementById('courseLocation').value = course.location;
            document.getElementById('courseDay').value = course.day;
            document.getElementById('coursePeriod').value = course.period;
            document.getElementById('courseWeeks').value = course.weeks;
            document.getElementById('courseWeekType').value = course.weekType;
            document.getElementById('deleteBtn').style.display = 'block';

            document.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
            document.querySelector(`.color-option[data-color="${course.color}"]`).classList.add('selected');
            selectedColor = course.color;

            document.getElementById('courseModal').classList.add('active');
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('courseModal').classList.remove('active');
        }

        // 保存课程
        function saveCourse(e) {
            e.preventDefault();

            const courseId = document.getElementById('courseId').value;
            const courseData = {
                name: document.getElementById('courseName').value,
                location: document.getElementById('courseLocation').value,
                day: parseInt(document.getElementById('courseDay').value),
                period: parseInt(document.getElementById('coursePeriod').value),
                weeks: document.getElementById('courseWeeks').value || '1-18周',
                weekType: document.getElementById('courseWeekType').value,
                color: selectedColor
            };

            if (courseId) {
                const index = courses.findIndex(c => c.id === parseInt(courseId));
                if (index !== -1) {
                    courses[index] = { ...courses[index], ...courseData };
                }
            } else {
                courses.push({ id: nextId++, ...courseData });
            }

            saveCourses();
            renderSchedule();
            closeModal();
        }

        // 删除课程
        function deleteCourse() {
            const courseId = parseInt(document.getElementById('courseId').value);
            courses = courses.filter(c => c.id !== courseId);
            saveCourses();
            renderSchedule();
            closeModal();
        }

        // 云同步设置
        function showSyncSetup() {
            document.getElementById('syncApiKey').value = syncApiKey;
            document.getElementById('syncBinId').value = syncBinId;
            document.getElementById('syncModal').classList.add('active');
        }

        function closeSyncModal() {
            document.getElementById('syncModal').classList.remove('active');
        }

        function saveSyncSettings() {
            syncApiKey = document.getElementById('syncApiKey').value.trim();
            const binIdInput = document.getElementById('syncBinId').value.trim();

            localStorage.setItem('schedule_sync_api_key', syncApiKey);

            if (syncApiKey) {
                if (binIdInput) {
                    syncBinId = binIdInput;
                    localStorage.setItem('schedule_sync_bin_id', syncBinId);
                    syncToCloud();
                } else {
                    createNewBin();
                }
            }

            closeSyncModal();
        }

        async function createNewBin() {
            if (!syncApiKey) return;

            try {
                const response = await fetch('https://api.jsonbin.io/v3/b', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': syncApiKey,
                        'X-Bin-Name': 'class-schedule-2026'
                    },
                    body: JSON.stringify({ courses, lastUpdate: new Date().toISOString() })
                });

                if (response.ok) {
                    const result = await response.json();
                    syncBinId = result.metadata.id;
                    localStorage.setItem('schedule_sync_bin_id', syncBinId);
                }
            } catch (error) {
                console.error('创建失败:', error);
            }
        }

        async function syncToCloud() {
            if (!syncApiKey || !syncBinId) return;

            try {
                await fetch(`https://api.jsonbin.io/v3/b/${syncBinId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': syncApiKey
                    },
                    body: JSON.stringify({ courses, lastUpdate: new Date().toISOString() })
                });
            } catch (error) {
                console.error('同步失败:', error);
            }
        }

        async function syncFromCloud() {
            if (!syncApiKey || !syncBinId) return;

            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${syncBinId}/latest`, {
                    headers: { 'X-Master-Key': syncApiKey }
                });

                if (response.ok) {
                    const result = await response.json();
                    if (result.record.courses) {
                        courses = result.record.courses;
                        saveCourses();
                        renderSchedule();
                    }
                }
            } catch (error) {
                console.error('同步失败:', error);
            }
        }

        function autoSync() {
            syncFromCloud().then(() => {
                if (syncApiKey && syncBinId) syncToCloud();
            });
        }

        let syncTimeout;
        function scheduleSync() {
            clearTimeout(syncTimeout);
            syncTimeout = setTimeout(() => syncToCloud(), 1000);
        }

        // 启动
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
